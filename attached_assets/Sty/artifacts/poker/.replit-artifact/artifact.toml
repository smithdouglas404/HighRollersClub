kind = "web"
previewPath = "/"
title = "Stitch Poker"
version = "1.0.0"
id = "artifacts/poker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21630

[services.development]
run = "pnpm --filter @workspace/poker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/poker", "run", "build" ]
publicDir = "artifacts/poker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21630"
BASE_PATH = "/"
