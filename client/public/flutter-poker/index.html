<!DOCTYPE html>
<html>
<head>
  <base href="/flutter-poker/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="High Rollers Club - Premium Poker">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="High Rollers Club">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>High Rollers Club - Poker</title>
  <link rel="manifest" href="manifest.json">

  <!--
    Gemini: "Create a very lightweight HTML/CSS 'Loading Table' or splash screen.
    This keeps the user engaged while the heavy Flutter engine initializes
    in the background."

    The CanvasKit/Wasm runtime is about 1.5MB-2MB. This splash shows immediately
    while the Wasm binary downloads and compiles.

    Safari Note (2026): WebKit was the last to fully optimize for WasmGC.
    Flutter handles this automatically — if Wasm fails, it falls back to the
    JS build. Do NOT force-disable the JS fallback.
  -->
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0a0a0c;
      overflow: hidden;
    }

    /* Gemini: "Lightweight HTML/CSS Loading Table" */
    #loading-splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0c;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    #loading-splash.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    /* Table outline — gives the feel of loading into the game */
    .loading-table {
      width: 320px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(ellipse at 50% 40%, #1a3a2a 0%, #0f2a1c 40%, #071a10 80%);
      border: 4px solid #1a1d24;
      box-shadow: 0 0 40px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.3);
      position: relative;
      margin-bottom: 24px;
    }

    .loading-table::after {
      content: '';
      position: absolute;
      inset: 6px;
      border-radius: 50%;
      border: 1.5px solid rgba(212, 175, 55, 0.2);
    }

    .loading-title {
      color: #d4af37;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 16px;
      text-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
    }

    /* Spinner */
    .loading-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(212, 175, 55, 0.15);
      border-top-color: #d4af37;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      color: rgba(255, 255, 255, 0.4);
      font-family: monospace;
      font-size: 11px;
      margin-top: 12px;
      letter-spacing: 1px;
    }

    /* Seat dots around the table */
    .seat-dot {
      position: absolute;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(88, 241, 255, 0.3);
      box-shadow: 0 0 6px rgba(88, 241, 255, 0.2);
    }
  </style>
</head>
<body>
  <!-- Gemini's loading splash — shows while Wasm downloads (~2MB) -->
  <div id="loading-splash">
    <div class="loading-table">
      <!-- 10 seat dots around the table ellipse -->
      <div class="seat-dot" style="left:50%;top:-4px;transform:translateX(-50%)"></div>
      <div class="seat-dot" style="left:15%;top:10%"></div>
      <div class="seat-dot" style="left:0;top:50%;transform:translateY(-50%)"></div>
      <div class="seat-dot" style="left:15%;bottom:10%"></div>
      <div class="seat-dot" style="left:50%;bottom:-4px;transform:translateX(-50%)"></div>
      <div class="seat-dot" style="right:50%;bottom:-4px;transform:translateX(50%)"></div>
      <div class="seat-dot" style="right:15%;bottom:10%"></div>
      <div class="seat-dot" style="right:0;top:50%;transform:translateY(-50%)"></div>
      <div class="seat-dot" style="right:15%;top:10%"></div>
    </div>
    <div class="loading-title">High Rollers Club</div>
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading table...</div>
  </div>

  <script>
    // Remove splash once Flutter is ready
    window.addEventListener('flutter-first-frame', function() {
      var splash = document.getElementById('loading-splash');
      if (splash) {
        splash.classList.add('fade-out');
        setTimeout(function() { splash.remove(); }, 600);
      }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
