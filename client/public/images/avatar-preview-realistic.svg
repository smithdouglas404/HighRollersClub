<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Warm casino lighting gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#2a1f14"/>
      <stop offset="60%" stop-color="#1a1208"/>
      <stop offset="100%" stop-color="#0d0a05"/>
    </radialGradient>
    <!-- Face skin gradient -->
    <radialGradient id="skinGrad" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#e8c49a"/>
      <stop offset="70%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#b8895a"/>
    </radialGradient>
    <!-- Suit jacket -->
    <linearGradient id="jacketGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f1729"/>
    </linearGradient>
    <!-- Shirt -->
    <linearGradient id="shirtGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#f0f0f0"/>
      <stop offset="100%" stop-color="#d9d9d9"/>
    </linearGradient>
    <!-- Hair gradient -->
    <radialGradient id="hairGrad" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#3a2a1a"/>
      <stop offset="100%" stop-color="#1a1008"/>
    </radialGradient>
    <!-- Overhead warm light -->
    <radialGradient id="topLight" cx="50%" cy="20%" r="50%">
      <stop offset="0%" stop-color="rgba(255,220,160,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,220,160,0)"/>
    </radialGradient>
    <!-- Shadow under chin -->
    <linearGradient id="chinShadow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.3)"/>
    </linearGradient>
    <!-- Vignette -->
    <radialGradient id="vignette" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="80%" stop-color="rgba(0,0,0,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.6)"/>
    </radialGradient>
    <!-- Clip for round avatar -->
    <clipPath id="roundClip">
      <rect x="10" y="10" width="380" height="380" rx="24"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="24" fill="url(#bgGrad)"/>

  <g clip-path="url(#roundClip)">
    <!-- Body / Shoulders -->
    <!-- Suit jacket shoulders -->
    <ellipse cx="200" cy="440" rx="180" ry="120" fill="url(#jacketGrad)"/>
    <!-- Left lapel -->
    <path d="M140 340 L170 400 L200 440 L130 440 Z" fill="#1e2640" stroke="#2a3050" stroke-width="0.5"/>
    <!-- Right lapel -->
    <path d="M260 340 L230 400 L200 440 L270 440 Z" fill="#1e2640" stroke="#2a3050" stroke-width="0.5"/>
    <!-- Shirt collar V -->
    <path d="M165 330 L200 390 L235 330" fill="url(#shirtGrad)" stroke="#ccc" stroke-width="0.5"/>
    <!-- Tie -->
    <path d="M195 345 L200 400 L205 345 L210 335 L190 335 Z" fill="#8b1a1a"/>
    <path d="M192 335 L200 342 L208 335 Z" fill="#a02020"/>

    <!-- Neck -->
    <rect x="183" y="290" width="34" height="55" rx="14" fill="#d4a574"/>
    <ellipse cx="200" cy="310" rx="20" ry="30" fill="url(#skinGrad)" opacity="0.8"/>

    <!-- Head shape -->
    <ellipse cx="200" cy="210" rx="82" ry="100" fill="url(#skinGrad)"/>

    <!-- Ear left -->
    <ellipse cx="118" cy="215" rx="14" ry="22" fill="#c9956a"/>
    <ellipse cx="120" cy="215" rx="8" ry="14" fill="#b8845a" opacity="0.6"/>

    <!-- Ear right -->
    <ellipse cx="282" cy="215" rx="14" ry="22" fill="#c9956a"/>
    <ellipse cx="280" cy="215" rx="8" ry="14" fill="#b8845a" opacity="0.6"/>

    <!-- Hair -->
    <path d="M118 190 C118 130 145 95 200 90 C255 95 282 130 282 190
             C282 170 275 140 260 125 C245 110 220 103 200 102
             C180 103 155 110 140 125 C125 140 118 170 118 190 Z"
          fill="url(#hairGrad)"/>
    <!-- Hair side left -->
    <path d="M118 190 C115 175 116 155 125 140 L120 195 Z" fill="#2a1a0a"/>
    <!-- Hair side right -->
    <path d="M282 190 C285 175 284 155 275 140 L280 195 Z" fill="#2a1a0a"/>
    <!-- Hair top highlight -->
    <path d="M150 110 C170 98 200 94 230 98 C215 95 185 95 150 110 Z" fill="#4a3a2a" opacity="0.5"/>

    <!-- Eyebrows -->
    <path d="M155 185 C162 178 178 176 188 180" stroke="#2a1a0a" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M212 180 C222 176 238 178 245 185" stroke="#2a1a0a" stroke-width="3.5" fill="none" stroke-linecap="round"/>

    <!-- Eyes -->
    <!-- Left eye -->
    <ellipse cx="172" cy="200" rx="18" ry="12" fill="white"/>
    <circle cx="174" cy="200" r="8" fill="#3a5a3a"/>
    <circle cx="174" cy="200" r="4.5" fill="#1a1a1a"/>
    <circle cx="177" cy="197" r="2.5" fill="white" opacity="0.8"/>
    <path d="M154 198 C160 190 184 190 190 198" stroke="#2a1a0a" stroke-width="1.5" fill="none"/>
    <path d="M156 202 C162 210 182 210 188 202" stroke="#2a1a0a" stroke-width="1" fill="none" opacity="0.4"/>

    <!-- Right eye -->
    <ellipse cx="228" cy="200" rx="18" ry="12" fill="white"/>
    <circle cx="226" cy="200" r="8" fill="#3a5a3a"/>
    <circle cx="226" cy="200" r="4.5" fill="#1a1a1a"/>
    <circle cx="229" cy="197" r="2.5" fill="white" opacity="0.8"/>
    <path d="M210 198 C216 190 240 190 246 198" stroke="#2a1a0a" stroke-width="1.5" fill="none"/>
    <path d="M212 202 C218 210 238 210 244 202" stroke="#2a1a0a" stroke-width="1" fill="none" opacity="0.4"/>

    <!-- Nose -->
    <path d="M200 200 L195 240 C195 245 200 248 205 245 L200 240"
          stroke="#b8895a" stroke-width="1.5" fill="none" opacity="0.6"/>
    <ellipse cx="193" cy="243" rx="5" ry="3.5" fill="none" stroke="#b8895a" stroke-width="1" opacity="0.4"/>
    <ellipse cx="207" cy="243" rx="5" ry="3.5" fill="none" stroke="#b8895a" stroke-width="1" opacity="0.4"/>

    <!-- Mouth -->
    <path d="M178 265 C185 272 195 275 200 275 C205 275 215 272 222 265"
          stroke="#a06040" stroke-width="2" fill="none"/>
    <!-- Upper lip -->
    <path d="M178 265 C185 263 195 262 200 264 C205 262 215 263 222 265"
          fill="#c07050" opacity="0.5"/>
    <!-- Slight smile line -->
    <path d="M175 267 C174 270 175 272 178 273" stroke="#b8895a" stroke-width="0.8" fill="none" opacity="0.3"/>
    <path d="M225 267 C226 270 225 272 222 273" stroke="#b8895a" stroke-width="0.8" fill="none" opacity="0.3"/>

    <!-- Jaw shadow -->
    <path d="M130 250 C145 295 175 315 200 318 C225 315 255 295 270 250"
          fill="url(#chinShadow)" opacity="0.15"/>

    <!-- Subtle stubble texture -->
    <rect x="160" y="260" width="80" height="45" rx="20" fill="#1a1a1a" opacity="0.04"/>

    <!-- Overhead warm light overlay -->
    <rect width="400" height="400" fill="url(#topLight)"/>

    <!-- Vignette -->
    <rect width="400" height="400" fill="url(#vignette)"/>
  </g>

  <!-- Subtle border frame -->
  <rect x="10" y="10" width="380" height="380" rx="24" fill="none"
        stroke="rgba(180,150,100,0.3)" stroke-width="1.5"/>

  <!-- Bottom nameplate area -->
  <rect x="10" y="340" width="380" height="50" rx="0" fill="rgba(0,0,0,0.5)"/>
  <rect x="10" y="380" width="380" height="10" rx="0 0 24 24" fill="rgba(0,0,0,0.5)"/>

  <text x="200" y="370" text-anchor="middle" font-family="'Georgia', serif"
        font-size="16" font-weight="600" fill="#d4af37" letter-spacing="2">
    THE GENTLEMAN
  </text>
</svg>