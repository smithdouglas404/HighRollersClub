# ── Tournaments ──────────────────────────────────────────────────────────────

/tournaments:
  get:
    operationId: getTournaments
    tags: [tournaments]
    summary: List tournaments
    responses:
      "200":
        description: Tournament list
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/Tournament"
  post:
    operationId: createTournament
    tags: [tournaments]
    summary: Create a new tournament
    security: [{ session: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [name, buyIn, maxPlayers]
            properties:
              name:
                type: string
              buyIn:
                type: number
              maxPlayers:
                type: integer
              startTime:
                type: string
                format: date-time
              blindStructure:
                type: string
              gameType:
                type: string
    responses:
      "200":
        description: Tournament created
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Tournament"
      "400":
        description: Validation error
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorMessage"
      "401":
        description: Not authenticated
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorMessage"

/tournaments/{id}:
  get:
    operationId: getTournamentById
    tags: [tournaments]
