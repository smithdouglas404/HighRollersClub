        description: Registered successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
      "400":
        description: Registration failed
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorMessage"
      "401":
        description: Not authenticated
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorMessage"

/tournaments/{id}/start:
  post:
    operationId: startTournament
    tags: [tournaments]
    summary: Start a tournament
    security: [{ session: [] }]
    parameters:
      - name: id
        in: path
        required: true
