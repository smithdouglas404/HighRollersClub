# ── Wallet & Payments ────────────────────────────────────────────────────────

/wallet/balance:
  get:
    operationId: getWalletBalance
    tags: [wallet]
    summary: Get combined wallet balance
    security: [{ session: [] }]
    responses:
      "200":
        description: Balance summary
        content:
          application/json:
            schema:
              type: object
              properties:
                balance:
                  type: number
                wallets:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      balance:
                        type: number
      "401":
        description: Not authenticated
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorMessage"

/wallet/balances:
  get:
    operationId: getWalletBalances
    tags: [wallet]
    summary: Get per-wallet balances with lock status
    security: [{ session: [] }]
    responses:
      "200":
        description: Wallet balances
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  walletType:
                    type: string
                  balance:
                    type: number
                  isLocked:
                    type: boolean
      "401":
        description: Not authenticated
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorMessage"

/wallet/daily-status:
  get:
    operationId: getDailyStatus
    tags: [wallet]
    summary: Check daily bonus claim status
    security: [{ session: [] }]
    responses:
      "200":
        description: Daily claim status
        content:
          application/json:
            schema:
              type: object
              properties:
                canClaim:
                  type: boolean
                nextClaimAt:
                  type: string
                  format: date-time
                  nullable: true
                streak:
                  type: integer
                  nullable: true
      "401":
        description: Not authenticated
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorMessage"

/wallet/claim-daily:
  post:
    operationId: claimDailyBonus
    tags: [wallet]
    summary: Claim daily bonus chips
    security: [{ session: [] }]
    responses:
      "200":
        description: Bonus claimed
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  type: number
                newBalance:
                  type: number
                streak:
                  type: integer
      "400":
        description: Already claimed today
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorMessage"
      "401":
        description: Not authenticated
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorMessage"

/wallet/transactions:
  get:
    operationId: getWalletTransactions
    tags: [wallet]
    summary: List wallet transactions
    security: [{ session: [] }]
    parameters:
      - name: limit
        in: query
        schema:
          type: integer
          default: 50
      - name: offset
        in: query
        schema:
          type: integer
          default: 0
    responses:
      "200":
        description: Transaction list
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/Transaction"
      "401":
        description: Not authenticated
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorMessage"

/wallet/sessions:
  get:
    operationId: getWalletSessions
    tags: [wallet]
    summary: List session summaries with profit/loss
    security: [{ session: [] }]
    responses:
      "200":
        description: Session summaries
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/SessionSummary"
      "401":
        description: Not authenticated
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorMessage"

/wallet/transfer:
  post:
    operationId: transferBetweenWallets
    tags: [wallet]
    summary: Transfer chips between wallets
    security: [{ session: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [fromWallet, toWallet, amount]
            properties:
              fromWallet:
                type: string
              toWallet:
                type: string
              amount:
                type: number
    responses:
      "200":
        description: Transfer completed
        content:
          application/json:
            schema:
              type: object
              properties:
                success:
                  type: boolean
                message:
                  type: string
      "400":
        description: Invalid transfer
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorMessage"
      "401":
        description: Not authenticated
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorMessage"

/wallet/withdraw:
  post:
    operationId: requestWithdrawal
    tags: [wallet]
    summary: Request a withdrawal
    security: [{ session: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [amount, currency, address]
            properties:
              amount:
                type: number
              currency:
                type: string
              address:
                type: string
    responses:
      "200":
        description: Withdrawal requested
        content:
          application/json:
            schema:
              type: object
              properties:
                requestId:
                  type: integer
      "400":
        description: Invalid withdrawal request
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorMessage"
      "401":
        description: Not authenticated
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorMessage"

/wallet/withdrawals:
  get:
    operationId: getMyWithdrawals
    tags: [wallet]
    summary: List my withdrawal requests
    security: [{ session: [] }]
    responses:
      "200":
        description: Withdrawal requests
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/WithdrawalRequest"
      "401":
        description: Not authenticated
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorMessage"

/payments/currencies:
  get:
    operationId: getPaymentCurrencies
    tags: [wallet]
    summary: List supported payment currencies
    responses:
      "200":
        description: Currency list
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/Currency"

/payments/gateways:
  get:
    operationId: getPaymentGateways
    tags: [wallet]
    summary: List available payment gateways
    responses:
      "200":
        description: Gateway list
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/Gateway"

/payments/deposit:
  post:
    operationId: createDeposit
    tags: [wallet]
    summary: Initiate a deposit
    security: [{ session: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [amount, currency, gateway]
            properties:
              amount:
                type: number
              currency:
                type: string
              gateway:
                type: string
              allocation:
                type: object
                description: Optional wallet allocation split
    responses:
      "200":
        description: Deposit initiated
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DepositResult"
      "400":
        description: Invalid deposit request
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorMessage"
      "401":
        description: Not authenticated
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorMessage"

/payments/{id}:
  get:
    operationId: getPaymentById
    tags: [wallet]
    summary: Get a single payment by ID
    security: [{ session: [] }]
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    responses:
      "200":
        description: Payment details
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Payment"
      "404":
        description: Payment not found
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorMessage"

/payments:
  get:
    operationId: getPayments
    tags: [wallet]
    summary: List my payments
    security: [{ session: [] }]
    parameters:
      - name: limit
        in: query
        schema:
          type: integer
          default: 50
      - name: offset
        in: query
        schema:
          type: integer
          default: 0
    responses:
      "200":
        description: Payment list
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/Payment"
      "401":
        description: Not authenticated
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorMessage"

/payments/webhook/{provider}:
  post:
    operationId: handlePaymentWebhook
    tags: [wallet]
    summary: Receive payment provider webhook
    parameters:
      - name: provider
        in: path
        required: true
        schema:
          type: string
    requestBody:
      content:
        application/json:
          schema:
            type: object
    responses:
      "200":
        description: Webhook acknowledged
        content:
          application/json:
            schema:
              type: object
              properties:
                received:
                  type: boolean

/sessions/history:
  get:
    operationId: getSessionHistory
    tags: [wallet]
    summary: Get full session history
    security: [{ session: [] }]
    responses:
      "200":
        description: Session history
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/SessionHistory"
      "401":
        description: Not authenticated
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ErrorMessage"

