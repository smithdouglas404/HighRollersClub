components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: connect.sid
      description: Session cookie set after login

  schemas:
    # ── Error ────────────────────────────────────────────────────────────────────

    ErrorMessage:
      type: object
      properties:
        message:
          type: string

    # ── User ─────────────────────────────────────────────────────────────────────

    SafeUser:
      type: object
      description: User object with password omitted
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        displayName:
          type: string
          nullable: true
        avatarId:
          type: string
          nullable: true
        tauntVoice:
          type: string
          default: default
        chipBalance:
          type: integer
          default: 10000
        role:
          type: string
          enum: [guest, member, admin]
        provider:
          type: string
          enum: [local, google, discord]
        lastDailyClaim:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    # ── Table ────────────────────────────────────────────────────────────────────

    Table:
      type: object
      properties:
        id:
          type: string
          format: uuid
        clubId:
          type: string
          nullable: true
        name:
          type: string
        maxPlayers:
          type: integer
          minimum: 2
          maximum: 10
        smallBlind:
          type: integer
        bigBlind:
          type: integer
        minBuyIn:
          type: integer
        maxBuyIn:
          type: integer
        ante:
          type: integer
        timeBankSeconds:
          type: integer
        isPrivate:
          type: boolean
        status:
          type: string
          enum: [waiting, playing]
        createdById:
          type: string
        allowBots:
          type: boolean
        replaceBots:
          type: boolean
        gameFormat:
          type: string
          enum: [cash, sng, heads_up, tournament, bomb_pot]
        blindSchedule:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/BlindLevel"
        bombPotFrequency:
          type: integer
        bombPotAnte:
          type: integer
        buyInAmount:
          type: integer
        startingChips:
          type: integer
        payoutStructure:
          type: array
          nullable: true
          items:
            type: object
            properties:
              place:
                type: integer
              percentage:
                type: number
        rakePercent:
          type: integer
        rakeCap:
          type: integer
        straddleEnabled:
          type: boolean
        bigBlindAnte:
          type: boolean
        gameSpeed:
          type: string
          enum: [normal, fast, turbo]
        showAllHands:
          type: boolean
        runItTwice:
          type: string
          enum: [always, ask, "no"]
        showdownSpeed:
          type: string
          enum: [fast, normal, slow]
        dealToAwayPlayers:
          type: boolean
        timeBankRefillHands:
          type: integer
        spectatorMode:
          type: boolean
        doubleBoard:
          type: boolean
        sevenTwoBounty:
          type: integer
        guestChatEnabled:
          type: boolean
        autoTrimExcessBets:
          type: boolean
        pokerVariant:
          type: string
          enum: [nlhe, plo, plo5, short_deck]
        useCentsValues:
          type: boolean
        awayTimeoutMinutes:
          type: integer
