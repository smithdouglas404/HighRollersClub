openapi: 3.1.0
info:
  title: High Rollers Club API
  version: 1.0.0
  description: |
    REST API for the High Rollers Club online poker platform.
    Supports cash games, sit-and-go, tournaments, clubs, wallets, and more.

servers:
  - url: /api
    description: Application API server

tags:
  - name: auth
    description: Authentication and session management
  - name: users
    description: User profiles and player stats
  - name: tables
    description: Poker table management and gameplay
  - name: games
    description: Hand history, actions, and analysis
  - name: tournaments
    description: Multi-table tournament management
  - name: clubs
    description: Club management, members, announcements, and events
  - name: wallet
    description: Wallet balances, transfers, daily bonus, and payments
  - name: shop
    description: In-game shop, purchases, and inventory
  - name: analytics
    description: Leaderboards, missions, and player notes
  - name: admin
    description: Admin-only reports, rake, withdrawals, and system controls
  - name: leagues
    description: Alliances and league seasons

paths:
  # ── Auth ──────────────────────────────────────────────────────────────────────

  /auth/guest:
    post:
      operationId: createGuest
      tags: [auth]
      summary: Create a guest account
      description: Creates a new guest user with a random name, avatar, and 10,000 starting chips.
      responses:
        "200":
          description: Guest user created and logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SafeUser"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new account
      description: |
        Creates a new member account with username and password.
        If called while logged in as a guest, upgrades the guest account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  minLength: 3
                  maxLength: 20
                password:
                  type: string
                  minLength: 6
                  maxLength: 100
                displayName:
                  type: string
                  minLength: 1
                  maxLength: 30
      responses:
        "200":
          description: User registered and logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SafeUser"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "409":
          description: Username already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "429":
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SafeUser"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "429":
          description: Too many login attempts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out the current session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get the currently authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SafeUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

  # ── Server Info ───────────────────────────────────────────────────────────────

  /health:
    get:
      operationId: healthCheck
      tags: [users]
      summary: Health check
      responses:
        "200":
          description: Server health status
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  storage:
                    type: string
                    enum: [database, memory]
                  warning:
                    type: string
                    nullable: true

  /online-users:
    get:
      operationId: getOnlineUsers
      tags: [users]
      summary: Get list of online user IDs
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Array of online user IDs
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  # ── Profile ───────────────────────────────────────────────────────────────────

  /profile/avatar:
    put:
      operationId: updateProfile
      tags: [users]
      summary: Update avatar, display name, or taunt voice
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                avatarId:
                  type: string
                displayName:
                  type: string
                  maxLength: 50
                tauntVoice:
                  type: string
                  maxLength: 30
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SafeUser"
        "400":
          description: No valid fields provided
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

  # ── Stats ─────────────────────────────────────────────────────────────────────

  /stats/me:
    get:
      operationId: getMyStats
      tags: [users]
      summary: Get current user's player statistics
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Player stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerStats"

  /leaderboard:
    get:
      operationId: getLeaderboard
      tags: [analytics]
      summary: Get global leaderboard
      security:
        - cookieAuth: []
      parameters:
        - name: metric
          in: query
          schema:
            type: string
            enum: [chips, wins, winRate]
            default: chips
      responses:
        "200":
          description: Leaderboard entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"

  # ── Tables ────────────────────────────────────────────────────────────────────

  /tables:
    get:
      operationId: listTables
      tags: [tables]
      summary: List all visible tables
      security:
        - cookieAuth: []
      parameters:
        - name: format
          in: query
          description: Filter by game format
          schema:
            type: string
            enum: [all, cash, sng, heads_up, tournament, bomb_pot]
        - name: variant
          in: query
          description: Filter by poker variant
          schema:
            type: string
            enum: [all, nlhe, plo, plo5, short_deck]
      responses:
        "200":
          description: List of tables
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TableSummary"
    post:
      operationId: createTable
      tags: [tables]
      summary: Create a new table
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTableRequest"
      responses:
        "201":
          description: Table created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Table"
        "400":
          description: Invalid table configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

  /tables/invite/{code}:
    get:
      operationId: resolveInviteCode
      tags: [tables]
      summary: Resolve an invite code to a table
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Table info for the invite code
          content:
            application/json:
              schema:
                type: object
                properties:
                  tableId:
                    type: string
                  name:
                    type: string
                  inviteCode:
                    type: string
        "404":
          description: Invalid invite code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

  /tables/{id}:
    get:
      operationId: getTable
      tags: [tables]
      summary: Get a single table with players and seat info
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Table details with players
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Table"
                  - type: object
                    properties:
                      players:
                        type: array
                        items:
                          $ref: "#/components/schemas/TablePlayer"
                      occupiedSeats:
                        type: array
                        items:
                          type: integer
                      returnMinBuyIn:
                        type: integer
                        nullable: true
        "404":
          description: Table not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
    delete:
      operationId: deleteTable
      tags: [tables]
      summary: Delete a table (creator only)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Table deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "404":
          description: Table not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

  /tables/{id}/join:
    post:
      operationId: joinTable
      tags: [tables]
      summary: Join a table with a buy-in
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [buyIn]
              properties:
                buyIn:
                  type: integer
                  minimum: 1
                seatIndex:
                  type: integer
                password:
                  type: string
      responses:
        "200":
          description: Joined successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "400":
          description: Invalid buy-in or table full
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "403":
          description: Incorrect table password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

  /tables/{id}/leave:
    post:
      operationId: leaveTable
      tags: [tables]
      summary: Leave a table
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Left the table
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /tables/{id}/video-token:
    post:
      operationId: getVideoToken
      tags: [tables]
      summary: Get a video chat token for a table
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Video token
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        "404":
          description: Table not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "503":
          description: Video not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

  /tables/{id}/hands:
    get:
      operationId: getTableHands
      tags: [games]
      summary: Get hand history for a table
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: List of hands
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GameHand"

  # ── Hand History & Verification ───────────────────────────────────────────────

  /hands/{id}:
    get:
      operationId: getHand
      tags: [games]
      summary: Get a specific hand
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Hand details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GameHand"
        "404":
          description: Hand not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

  /hands/{id}/verify:
    get:
      operationId: verifyHand
      tags: [games]
      summary: Get provably fair verification data for a hand
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Verification data
          content:
            application/json:
              schema:
                type: object
                properties:
                  serverSeed:
                    type: string
                  commitmentHash:
                    type: string
                  deckOrder:
                    type: string
                  handNumber:
                    type: integer
                  tableId:
                    type: string
        "404":
          description: Hand or proof data not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

  /hands/{id}/players:
    get:
      operationId: getHandPlayers
      tags: [games]
      summary: Get players who participated in a hand
      description: Hole cards are only revealed for the requesting user or players who went to showdown.
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of hand players
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HandPlayer"

  /hands/{id}/actions:
    get:
      operationId: getHandActions
      tags: [games]
      summary: Get action-by-action replay log for a hand
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of hand actions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HandAction"

  /players/{id}/hands:
    get:
      operationId: getPlayerHands
      tags: [games]
      summary: Get hand history for a specific player
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Player hand history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HandPlayer"

  # ── Hand Analysis ─────────────────────────────────────────────────────────────

  /analyze-hand:
    post:
      operationId: analyzeHand
      tags: [games]
      summary: Analyze a poker hand
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [holeCards]
              properties:
                holeCards:
                  type: array
                  items:
                    $ref: "#/components/schemas/Card"
                communityCards:
                  type: array
                  items:
                    $ref: "#/components/schemas/Card"
                pot:
                  type: integer
                  default: 0
                position:
                  type: string
                  enum: [early, middle, late, blind]
                handId:
                  type: string
      responses:
        "200":
          description: Hand analysis result
          content:
            application/json:
              schema:
                type: object
                properties:
                  rating:
                    type: string
                  ev:
                    type: number
                  leaks:
                    type: array
                    items:
                      type: string
                  recommendations:
                    type: array
                    items:
                      type: string

  /analyses:
    get:
      operationId: getMyAnalyses
      tags: [games]
      summary: Get current user's hand analyses
      security:
        - cookieAuth: []
      responses:
        "200":
          description: List of analyses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HandAnalysis"

  # ── Clubs ─────────────────────────────────────────────────────────────────────

  /me/clubs:
    get:
      operationId: getMyClubs
      tags: [clubs]
      summary: Get clubs the current user is a member of
      security:
        - cookieAuth: []
      responses:
        "200":
          description: User's clubs with member counts
          content:
            application/json:
              schema:
                type: array
                items:
                  allOf:
                    - $ref: "#/components/schemas/Club"
                    - type: object
                      properties:
                        memberCount:
                          type: integer

  /clubs:
    get:
      operationId: listClubs
      tags: [clubs]
      summary: List all clubs (private clubs hidden for unauthenticated users)
      responses:
        "200":
          description: List of clubs
          content:
            application/json:
              schema:
                type: array
                items:
                  allOf:
                    - $ref: "#/components/schemas/Club"
                    - type: object
                      properties:
                        memberCount:
                          type: integer
    post:
      operationId: createClub
      tags: [clubs]
      summary: Create a new club
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                description:
                  type: string
                isPublic:
                  type: boolean
                  default: true
      responses:
        "201":
          description: Club created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Club"
        "400":
          description: Invalid club data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

  /clubs/my-pending-requests:
    get:
      operationId: getMyPendingClubRequests
      tags: [clubs]
      summary: Get current user's pending club join requests
      security:
        - cookieAuth: []
      responses:
        "200":
          description: List of pending requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClubInvitation"

  /clubs/{id}:
    get:
      operationId: getClub
      tags: [clubs]
      summary: Get a single club
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Club details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Club"
                  - type: object
                    properties:
                      memberCount:
                        type: integer
        "404":
          description: Club not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
    put:
      operationId: updateClub
      tags: [clubs]
      summary: Update club settings (owner/admin only)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                isPublic:
                  type: boolean
                avatarUrl:
                  type: string
                ownerId:
                  type: string
                  description: Transfer ownership to another member
      responses:
        "200":
          description: Updated club
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Club"
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
    delete:
      operationId: deleteClub
      tags: [clubs]
      summary: Delete a club (owner only)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Club deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

  /clubs/{id}/members:
    get:
      operationId: getClubMembers
      tags: [clubs]
      summary: Get club members with user data
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Enriched club members
          content:
            application/json:
              schema:
                type: array
                items:
                  allOf:
                    - $ref: "#/components/schemas/ClubMember"
                    - type: object
                      properties:
                        username:
                          type: string
                        displayName:
                          type: string
                        avatarId:
                          type: string
                          nullable: true
                        chipBalance:
                          type: integer

  /clubs/{id}/members/stats:
    get:
      operationId: getClubMembersStats
      tags: [clubs]
      summary: Get stats for all club members
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Stats keyed by user ID
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  $ref: "#/components/schemas/PlayerStats"

  /clubs/{id}/members/{userId}/role:
    put:
      operationId: updateClubMemberRole
      tags: [clubs]
      summary: Promote or demote a club member
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [admin, member]
      responses:
        "200":
          description: Role updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

  /clubs/{id}/members/{userId}:
    delete:
      operationId: kickClubMember
      tags: [clubs]
      summary: Kick a member from the club (admin/owner only)
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Member removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        "400":
          description: Cannot kick the owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "403":
          description: Not authorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"

  /clubs/{id}/join:
    post:
      operationId: joinClub
      tags: [clubs]
      summary: Join a public club directly
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Joined club
          content:
