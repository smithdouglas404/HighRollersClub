openapi: "3.0.3"
info:
  title: High Rollers Poker API
  version: "1.0.0"
  description: Full-stack poker platform API
servers:
  - url: /api

tags:
  - name: auth
    description: Authentication, 2FA, wallet, and recovery operations
  - name: tables
    description: Poker table CRUD, join/leave, and hand history
  - name: fast-fold
    description: Fast-fold pool management
  - name: lottery-sng
    description: Lottery Sit-and-Go registration and tier listing
  - name: clubs
    description: Club CRUD, membership, announcements, events, and challenges

# ─── Security Schemes ──────────────────────────────────────────────────────────
security: []

components:
  securitySchemes:
    session:
      type: apiKey
      in: cookie
      name: connect.sid
      description: Express-session cookie

  schemas:
    # ── Core user object returned by auth endpoints ──
    AuthUser:
      type: object
      required:
        - id
        - username
        - chipBalance
        - role
        - provider
        - twoFactorEnabled
        - tier
        - kycStatus
        - createdAt
      properties:
        id:
          type: string
        username:
          type: string
        displayName:
          type: string
          nullable: true
        avatarId:
          type: string
          nullable: true
        tauntVoice:
          type: string
          nullable: true
        chipBalance:
          type: integer
        role:
          type: string
          enum: [guest, member, admin]
        provider:
          type: string
          enum: [local, google]
        lastDailyClaim:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        walletAddress:
          type: string
          nullable: true
        twoFactorEnabled:
          type: boolean
        tier:
          type: string
          enum: [free, bronze, silver, gold, platinum]
        tierExpiresAt:
          type: string
          nullable: true
        kycStatus:
          type: string
          enum: [none, pending, verified, rejected]
        memberId:
          type: string
          nullable: true
        firebaseUid:
          type: string
          nullable: true
        createdAt:
          type: string

    # ── Table ──
    Table:
      type: object
      required:
        - id
        - name
        - smallBlind
        - bigBlind
        - ante
        - minBuyIn
        - maxBuyIn
        - maxPlayers
        - timeBankSeconds
        - gameFormat
        - gameSpeed
        - isPrivate
        - createdById
        - playerCount
        - createdAt
      properties:
        id:
          type: string
        name:
          type: string
        smallBlind:
          type: integer
        bigBlind:
          type: integer
        ante:
          type: integer
        minBuyIn:
          type: integer
        maxBuyIn:
          type: integer
        maxPlayers:
          type: integer
        timeBankSeconds:
          type: integer
        gameFormat:
          type: string
          enum: [cash, sng, heads_up, tournament, bomb_pot, fast_fold, lottery_sng]
        gameSpeed:
          type: string
        isPrivate:
          type: boolean
        createdById:
          type: string
        playerCount:
          type: integer
        createdAt:
          type: string

    InsertTable:
      type: object
      required:
        - name
        - smallBlind
        - bigBlind
        - minBuyIn
        - maxBuyIn
        - maxPlayers
      properties:
        name:
          type: string
        smallBlind:
          type: integer
        bigBlind:
          type: integer
        ante:
          type: integer
          default: 0
        minBuyIn:
          type: integer
        maxBuyIn:
          type: integer
        maxPlayers:
          type: integer
        timeBankSeconds:
          type: integer
          default: 30
        gameFormat:
          type: string
          enum: [cash, sng, heads_up, tournament, bomb_pot, fast_fold, lottery_sng]
          default: cash
        gameSpeed:
          type: string
          default: normal
        isPrivate:
          type: boolean
          default: false

    GameHand:
      type: object
      properties:
        id:
          type: string
        tableId:
          type: string
        handNumber:
          type: integer
        communityCards:
          type: array
          items:
            type: string
        potSize:
          type: integer
        winners:
          type: array
          items:
            type: string
        createdAt:
          type: string

    # ── Fast-Fold ──
    FastFoldPool:
      type: object
      required:
        - id
        - name
        - smallBlind
        - bigBlind
        - minBuyIn
        - maxBuyIn
        - playerCount
      properties:
        id:
          type: string
        name:
          type: string
        smallBlind:
          type: integer
        bigBlind:
          type: integer
        minBuyIn:
          type: integer
        maxBuyIn:
          type: integer
        maxPlayersPerTable:
          type: integer
        playerCount:
          type: integer
        createdAt:
          type: string

    # ── Lottery SNG ──
    LotterySNGTier:
      type: object
      properties:
        id:
          type: string
        buyIn:
          type: integer
        prizeMultipliers:
          type: array
          items:
            type: number
        probabilities:
          type: array
          items:
            type: number
        maxPlayers:
          type: integer

    # ── Club ──
    Club:
      type: object
      required:
        - id
        - name
        - ownerId
        - isPublic
        - timezone
        - language
        - rakePercent
        - createdAt
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        ownerId:
          type: string
        avatarUrl:
          type: string
          nullable: true
        isPublic:
          type: boolean
        timezone:
          type: string
        language:
          type: string
        rakePercent:
          type: integer
        createdAt:
          type: string

    ClubRanking:
      type: object
      properties:
        clubId:
          type: string
        name:
          type: string
        eloRating:
          type: integer
        memberCount:
          type: integer

    ClubMember:
      type: object
      properties:
        id:
          type: string
        clubId:
          type: string
        userId:
          type: string
        username:
          type: string
        role:
          type: string
          enum: [owner, admin, member]
        joinedAt:
          type: string

    MemberStats:
      type: object
      properties:
        userId:
          type: string
        username:
          type: string
        handsPlayed:
          type: integer
        totalWinnings:
          type: integer
        winRate:
          type: number

    Invitation:
      type: object
      properties:
        id:
          type: string
        clubId:
          type: string
        userId:
          type: string
        type:
          type: string
          enum: [invite, request]
        status:
          type: string
          enum: [pending, accepted, rejected]
        createdAt:
          type: string

    FeedItem:
      type: object
      properties:
        id:
          type: string
        clubId:
          type: string
        clubName:
          type: string
        type:
          type: string
        content:
          type: string
        createdAt:
          type: string

    ActiveClub:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        avatarUrl:
          type: string
          nullable: true
        role:
          type: string
        activePlayers:
          type: integer

    Announcement:
      type: object
      properties:
        id:
          type: string
        clubId:
          type: string
        title:
          type: string
        content:
          type: string
        authorId:
          type: string
        createdAt:
          type: string

    ClubEvent:
      type: object
      properties:
        id:
          type: string
        clubId:
          type: string
        title:
          type: string
        description:
          type: string
          nullable: true
        startTime:
          type: string
        endTime:
          type: string
          nullable: true
        type:
          type: string
        createdAt:
          type: string

    Challenge:
      type: object
      properties:
        id:
          type: string
        clubId:
          type: string
        title:
          type: string
        description:
          type: string
        goal:
          type: integer
        reward:
          type: integer
        expiresAt:
          type: string

    Tournament:
      type: object
      properties:
        id:
          type: string
        clubId:
          type: string
        name:
          type: string
        buyIn:
          type: integer
        prizePool:
          type: integer
        maxPlayers:
          type: integer
        startTime:
          type: string
        status:
          type: string

    LeaderboardEntry:
      type: object
      properties:
        userId:
          type: string
        username:
          type: string
        displayName:
          type: string
          nullable: true
        score:
          type: number
        rank:
          type: integer

    Alliance:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        clubs:
          type: array
          items:
            type: string
        createdAt:
          type: string

    QuickStats:
      type: object
      properties:
        topWinner:
          type: string
        mostActiveTable:
          type: string
        totalHands:
          type: integer
        activePlayers:
          type: integer

    WalletInfo:
      type: object
      properties:
        provider:
          type: string
        address:
          type: string

    # ── Generic wrappers ──
    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    SuccessResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    # ── Auth request bodies ──
    RegisterRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 20
        password:
          type: string
          minLength: 6
          maxLength: 100
        displayName:
          type: string
          maxLength: 30

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    FirebaseSyncRequest:
      type: object
      properties:
        displayName:
          type: string
        username:
          type: string
        avatarUrl:
          type: string
        email:
          type: string

    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string

    TwoFactorCodeRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string

    RecoverWithCodeRequest:
      type: object
      required: [username, code]
      properties:
        username:
          type: string
        code:
          type: string

    RequestRecoveryEmailRequest:
      type: object
      properties:
        email:
          type: string
        username:
          type: string

    VerifyRecoveryEmailRequest:
      type: object
      required: [username, code]
      properties:
        username:
          type: string
        code:
          type: string

    VerifyWalletRequest:
      type: object
      required: [address, signature, token]
      properties:
        address:
          type: string
        signature:
          type: string
        token:
          type: string

    WalletConnectRequest:
      type: object
      required: [provider, address]
      properties:
        provider:
          type: string
        address:
          type: string

    WalletDisconnectRequest:
      type: object
      required: [provider]
      properties:
        provider:
          type: string

    # ── Table request bodies ──
    JoinTableRequest:
      type: object
      required: [buyIn]
      properties:
        buyIn:
          type: integer
        seatIndex:
          type: integer
        password:
          type: string

    # ── Fast-fold request bodies ──
    CreateFastFoldPoolRequest:
      type: object
      required: [name, smallBlind, bigBlind, minBuyIn, maxBuyIn]
      properties:
        name:
          type: string
        smallBlind:
          type: integer
        bigBlind:
          type: integer
        minBuyIn:
          type: integer
        maxBuyIn:
          type: integer
        maxPlayersPerTable:
          type: integer

    JoinFastFoldRequest:
      type: object
      required: [buyIn]
      properties:
        buyIn:
          type: integer

    # ── Lottery SNG request bodies ──
    RegisterLotterySNGRequest:
      type: object
      required: [buyIn]
      properties:
        buyIn:
          type: integer

    # ── Club request bodies ──
    CreateClubRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        isPublic:
          type: boolean

    UpdateClubRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        isPublic:
          type: boolean
        timezone:
          type: string
        language:
          type: string
        rakePercent:
          type: integer

    InviteRequest:
      type: object
      properties:
        userId:
          type: string
        type:
          type: string
          enum: [invite, request]

    UpdateInvitationRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [accepted, rejected]

    UpdateMemberRoleRequest:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [admin, member]

    CreateAnnouncementRequest:
      type: object
      required: [title, content]
      properties:
        title:
          type: string
        content:
          type: string

    CreateClubEventRequest:
      type: object
      required: [title, startTime]
      properties:
        title:
          type: string
        description:
          type: string
        startTime:
          type: string
        endTime:
          type: string
        type:
          type: string

# ═══════════════════════════════════════════════════════════════════════════════
# Paths
# ═══════════════════════════════════════════════════════════════════════════════
paths:

  # ─── Auth ────────────────────────────────────────────────────────────────────

  /auth/guest:
    post:
      tags: [auth]
      summary: Create a guest session
      operationId: createGuest
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Guest account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"

  /auth/register:
    post:
      tags: [auth]
      summary: Register a new account
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: Account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"

  /auth/login:
    post:
      tags: [auth]
      summary: Log in with username and password
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"

  /auth/logout:
    post:
      tags: [auth]
      summary: Log out current session
      operationId: logout
      security:
        - session: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      tags: [auth]
      summary: Get current authenticated user
      operationId: getMe
      security:
        - session: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"

  /auth/firebase-sync:
    post:
      tags: [auth]
      summary: Sync or create account from Firebase token
      operationId: firebaseSync
      security:
        - session: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FirebaseSyncRequest"
      responses:
        "200":
          description: Account synced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"

  /auth/change-password:
    post:
      tags: [auth]
      summary: Change password for current user
      operationId: changePassword
      security:
        - session: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordRequest"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/2fa/setup:
    post:
      tags: [auth]
      summary: Generate 2FA secret and QR URL
      operationId: setup2FA
      security:
        - session: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: 2FA setup data
          content:
            application/json:
              schema:
                type: object
                required: [secret, otpauthUrl]
                properties:
                  secret:
                    type: string
                  otpauthUrl:
                    type: string

  /auth/2fa/verify:
    post:
      tags: [auth]
      summary: Verify and enable 2FA with TOTP code
      operationId: verify2FA
      security:
        - session: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TwoFactorCodeRequest"
      responses:
        "200":
          description: 2FA enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/2fa/disable:
    post:
      tags: [auth]
      summary: Disable 2FA for current user
      operationId: disable2FA
      security:
        - session: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: 2FA disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/generate-recovery-codes:
    post:
      tags: [auth]
      summary: Generate one-time recovery codes
      operationId: generateRecoveryCodes
      security:
        - session: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Recovery codes generated
          content:
            application/json:
              schema:
                type: object
                required: [codes]
                properties:
                  codes:
                    type: array
                    items:
                      type: string

  /auth/recover-with-code:
    post:
      tags: [auth]
      summary: Log in using a recovery code
      operationId: recoverWithCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecoverWithCodeRequest"
      responses:
        "200":
          description: Recovery successful
          content:
            application/json:
              schema:
                type: object
                required: [message, user]
                properties:
                  message:
                    type: string
                  user:
                    $ref: "#/components/schemas/AuthUser"

  /auth/request-recovery-email:
    post:
      tags: [auth]
      summary: Send a recovery code to user email
      operationId: requestRecoveryEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestRecoveryEmailRequest"
      responses:
        "200":
          description: Email sent status
          content:
            application/json:
              schema:
                type: object
                required: [sent]
                properties:
                  sent:
                    type: boolean

  /auth/verify-recovery-email:
    post:
      tags: [auth]
      summary: Verify recovery code from email
      operationId: verifyRecoveryEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyRecoveryEmailRequest"
      responses:
        "200":
          description: Recovery verified
          content:
            application/json:
              schema:
                type: object
                required: [message, user]
                properties:
                  message:
                    type: string
                  user:
                    $ref: "#/components/schemas/AuthUser"

  /auth/wallet-challenge:
    post:
      tags: [auth]
      summary: Request a wallet signature challenge
      operationId: walletChallenge
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Challenge issued
          content:
            application/json:
              schema:
                type: object
                required: [challenge, token]
                properties:
                  challenge:
                    type: string
                  token:
                    type: string

  /auth/verify-wallet:
    post:
      tags: [auth]
      summary: Verify wallet signature and authenticate
      operationId: verifyWallet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyWalletRequest"
      responses:
        "200":
          description: Wallet verified
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string
                  user:
                    $ref: "#/components/schemas/AuthUser"

  /auth/wallet/connect:
    post:
      tags: [auth]
      summary: Connect an external wallet provider
      operationId: connectWallet
      security:
        - session: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletConnectRequest"
      responses:
        "200":
          description: Wallet connected
          content:
            application/json:
              schema:
                type: object
                required: [message, provider, address]
                properties:
                  message:
                    type: string
                  provider:
                    type: string
                  address:
                    type: string

  /auth/wallet/disconnect:
    post:
      tags: [auth]
      summary: Disconnect a wallet provider
      operationId: disconnectWallet
      security:
        - session: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalletDisconnectRequest"
      responses:
        "200":
          description: Wallet disconnected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/wallets:
    get:
      tags: [auth]
      summary: List connected wallets
      operationId: getWallets
      security:
        - session: []
      responses:
        "200":
          description: Connected wallets
          content:
            application/json:
              schema:
                type: object
                required: [wallets]
                properties:
                  wallets:
                    type: array
                    items:
                      $ref: "#/components/schemas/WalletInfo"

  # ─── Tables ──────────────────────────────────────────────────────────────────

  /tables:
    get:
      tags: [tables]
      summary: List all tables with optional filters
      operationId: listTables
      parameters:
        - name: format
          in: query
          schema:
            type: string
        - name: variant
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Table list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Table"
    post:
      tags: [tables]
      summary: Create a new table
      operationId: createTable
      security:
        - session: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InsertTable"
      responses:
        "201":
          description: Table created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Table"

  /tables/invite/{code}:
    get:
      tags: [tables]
      summary: Resolve an invite code to a table ID
      operationId: resolveInviteCode
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Resolved table
          content:
            application/json:
              schema:
                type: object
                required: [tableId]
                properties:
                  tableId:
                    type: string

  /tables/{id}:
    get:
      tags: [tables]
      summary: Get a single table by ID
      operationId: getTable
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Table details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Table"
    delete:
      tags: [tables]
      summary: Delete a table
